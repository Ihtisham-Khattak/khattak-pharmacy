# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: "23.x"

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Publish installers
        # Code signing: to sign Windows/macOS installers, add a code-signing
        # certificate to this repository's GitHub Actions secrets:
        #   - CSC_LINK: the .pfx (Windows) or .p12 (macOS) certificate file,
        #     base64-encoded
        #   - CSC_KEY_PASSWORD: the password for that certificate file
        # electron-builder/electron-forge's signing tooling skips signing
        # gracefully when CSC_LINK is empty, so until these secrets are
        # configured, builds remain UNSIGNED and users will see SmartScreen /
        # Gatekeeper warnings when installing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO: false
        run: npm run publish
      
      - name: Generate latest.yml
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: node latest-yml.js
